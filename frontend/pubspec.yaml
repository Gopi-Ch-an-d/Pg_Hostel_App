name: pg_hostel
description: PG Hostel Management App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.0
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  fl_chart: ^0.64.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.2.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  url_launcher: ^6.1.12
  font_awesome_flutter: ^10.7.0
  local_auth: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# ── App Icon Config ────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/Pg.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1B3A4B"
  adaptive_icon_foreground: "assets/icon/Pg.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/